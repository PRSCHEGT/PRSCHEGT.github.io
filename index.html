<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Accesos</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
.fade { animation: fade .2s ease-in-out; }
@keyframes fade { from {opacity:0} to {opacity:1} }
</style>
</head>

<body class="bg-gray-100 min-h-screen p-6">

<h1 class="text-3xl font-bold mb-6">Panel de Accesos</h1>

<div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 flex justify-center items-center fade">
<div class="bg-white p-5 rounded-xl w-full max-w-md">

<h2 class="text-lg font-bold mb-3">Agregar acceso</h2>

<form id="form">

<input id="title" placeholder="Nombre" class="w-full border p-2 mb-2 rounded" required>
<input id="url" placeholder="https://..." class="w-full border p-2 mb-2 rounded">

<select id="icon" class="w-full border p-2 mb-2 rounded">
<option value="link">link</option>
<option value="user">user</option>
<option value="home">home</option>
<option value="globe">globe</option>
<option value="file">file</option>
<option value="youtube">youtube</option>
<option value="mail">mail</option>
<option value="map">map</option>
<option value="phone">phone</option>
</select>

<select id="color" class="w-full border p-2 mb-2 rounded">
<option value="bg-blue-500">Azul</option>
<option value="bg-red-500">Rojo</option>
<option value="bg-green-500">Verde</option>
<option value="bg-yellow-500">Amarillo</option>
<option value="bg-purple-500">Morado</option>
<option value="bg-pink-500">Rosa</option>
<option value="bg-indigo-500">Indigo</option>
<option value="bg-teal-500">Teal</option>
<option value="bg-orange-500">Naranja</option>
</select>

<div class="flex justify-end gap-2 mt-3">
<button type="button" onclick="closeModal()">Cancelar</button>
<button class="bg-blue-500 text-white px-4 py-2 rounded">Guardar</button>
</div>

</form>

</div>
</div>

<script>

let links = JSON.parse(localStorage.getItem('links') || '[]');

function save() {
    localStorage.setItem('links', JSON.stringify(links));
}

function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    links.forEach((l,i) => {
        grid.innerHTML += `
        <div onclick="openLink('${l.url}')"
        class="bg-white p-4 rounded-xl shadow relative cursor-pointer">

        <button onclick="event.stopPropagation(); remove(${i})"
        class="absolute top-2 right-2">🗑</button>

        <div class="w-14 h-14 ${l.color} text-white flex items-center justify-center rounded mb-2">
        <i data-lucide="${l.icon}"></i>
        </div>

        <p>${l.title}</p>
        </div>
        `;
    });

    grid.innerHTML += `
    <div onclick="openModal()"
    class="border-2 border-dashed flex items-center justify-center cursor-pointer">
    +
    </div>
    `;

    lucide.createIcons();
}

function openLink(url) {
    window.open(url, '_blank');
}

function openModal() {
    modal.classList.remove('hidden');
}

function closeModal() {
    modal.classList.add('hidden');
}

document.getElementById('form').onsubmit = (e) => {
    e.preventDefault();

    const newLink = {
        title: title.value,
        url: url.value,
        icon: icon.value,
        color: color.value
    };

    links.push(newLink);
    save();
    render();
    closeModal();
};

function remove(i) {
    links.splice(i,1);
    save();
    render();
}

render();

</script>

</body>
</html>
